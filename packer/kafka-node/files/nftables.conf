#!/usr/sbin/nft -f
#
# kafka-node — nftables ruleset (Phase 0.H.1)
#
# Builds on the deb13 baseline (deny-all-inbound, allow SSH +
# node_exporter from VMnet11) and adds the kafka-node role's
# cluster-backplane + operator-access rules.
#
# At clone time the primary NIC is `nic0` (VMnet11 service) and the
# secondary NIC is `nic1` (VMnet10 cluster backplane), set up by
# kafka-node-firstboot.sh post-clone.
#
# Kept in sync with role-overlay-nftables-backplane.tf, which pushes this
# exact file to each clone + `nft -f` at apply time (so a clone built from
# an older template still converges to the current ruleset; idempotent on
# a cold rebuild where the baked file is already current).

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state { established, related } accept
        ct state invalid drop

        # ICMP — let everything ping (debug-friendly in a lab)
        ip protocol icmp   accept
        ip6 nexthdr icmpv6 accept

        # Management from the lab network only
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 22   accept comment "SSH from VMnet11"
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport 9100 accept comment "node_exporter from VMnet11"

        # Phase 0.H.1 — kafka-node role: trust the VMnet10 cluster backplane.
        # KRaft controller quorum (9093) + inter-broker replication (9092) +
        # MM2 cross-cluster traffic + Confluent inter-component traffic all
        # flow over nic1. Enumerating every port across two KRaft clusters +
        # five ecosystem service types is fragile; the canonical pattern is
        # "the cluster backplane is trusted." nic1 only carries
        # 192.168.10.0/24 traffic; the saddr restriction prevents cross-
        # network leak via misconfigured routing.
        iifname "nic1" ip saddr 192.168.10.0/24 accept comment "trusted cluster backplane (VMnet10)"

        # Phase 0.H — operator + app access from the build host / lab (VMnet11).
        #   9092  Kafka client listener (produce/consume, smoke gates)
        #   8081  Confluent Schema Registry (0.H.3)
        #   8082  Confluent REST Proxy (0.H.3)
        #   8083  Kafka Connect REST API (0.H.4)
        #   8088  ksqlDB REST API (0.H.4)
        # Rule present on every kafka-node regardless of role -- harmless
        # when no listener is bound (e.g. 8081 on a broker node).
        iifname "nic0" ip saddr 192.168.70.0/24 tcp dport { 9092, 8081, 8082, 8083, 8088 } accept comment "Kafka client + Confluent ecosystem APIs from VMnet11"

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
