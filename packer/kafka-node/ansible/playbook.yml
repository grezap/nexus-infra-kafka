---
# kafka-node — Ansible playbook (local, run by Packer ansible-local provisioner)
#
# Same shape as nexus-infra-swarm-nomad/packer/swarm-node/ansible/playbook.yml.
# Four shared nexus_* roles run first, then kafka_node installs Temurin JDK,
# Apache Kafka, Confluent Community, the firstboot script + systemd units (all
# role units delivered DISABLED — the Terraform role-overlays enable exactly
# one per node).
#
# Order: nexus_identity (sshd) -> nexus_network (NIC rename) -> nexus_firewall
# (rules need nic0/nic1 to exist) -> nexus_observability (node_exporter
# binding uses the renamed NIC) -> kafka_node (assumes the baseline is up).

- name: Configure kafka-node template (Phase 0.H.1)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    target_user: "{{ target_user | default('nexusadmin') }}"
    # Pass-through from Packer extra-vars to role-internal names
    kafka_node_jdk_apt_channel: "{{ jdk_apt_channel | default('main') }}"
    kafka_node_jdk_major: "{{ jdk_major | default(21) }}"
    kafka_node_kafka_version: "{{ kafka_version | default('3.8.1') }}"
    kafka_node_kafka_scala_version: "{{ kafka_scala_version | default('2.13') }}"
    kafka_node_confluent_version: "{{ confluent_version | default('7.7.1') }}"

  roles:
    - nexus_identity
    - nexus_network
    - nexus_firewall
    - nexus_observability
    - kafka_node
