---
# kafka_node role defaults

kafka_node_jdk_apt_channel: main
kafka_node_jdk_major: 21
kafka_node_kafka_version: "3.8.1"
kafka_node_kafka_scala_version: "2.13"
kafka_node_confluent_version: "7.7.1"

# System account every Kafka-family service runs as.
kafka_node_user: kafka
kafka_node_group: kafka

# Install roots.
kafka_node_kafka_home: /opt/kafka
kafka_node_confluent_home: /opt/confluent

# Per-node config + data + log dirs (config rendered by Terraform role-overlays).
kafka_node_config_dir: /etc/nexus-kafka
kafka_node_data_dir: /var/lib/kafka
kafka_node_log_dir: /var/log/kafka

# Apache Kafka tarball lives on archive.apache.org (stable, checksummed).
kafka_node_kafka_tgz: "kafka_{{ kafka_node_kafka_scala_version }}-{{ kafka_node_kafka_version }}.tgz"
kafka_node_kafka_url: "https://archive.apache.org/dist/kafka/{{ kafka_node_kafka_version }}/{{ kafka_node_kafka_tgz }}"
# Literal sha512 for kafka_2.13-3.8.1.tgz -- lowercased + concatenated from
# the MULTI-LINE .sha512 sidecar at archive.apache.org (Apache wraps the hash
# across indented continuation lines, which a single-line awk parse chokes
# on -- the 0.H.1 v1 build failure). Pinned like the Debian ISO checksum:
# robust, no build-time parse. Bumping kafka_node_kafka_version requires
# refreshing this from
# https://archive.apache.org/dist/kafka/<ver>/kafka_<scala>-<ver>.tgz.sha512
kafka_node_kafka_sha512: "b43fada353b7dca51c0f90acf594ec1ce06b2344c046d4059d4deab0615e0e3e76e92eccdbdfa1adad1fbde76c5f25e71acd0db013fb4b1778827448b5285edf"

# Confluent Community tarball lives on packages.confluent.io.
# major.minor is derived from the full version (7.7.1 -> 7.7).
kafka_node_confluent_minor: "{{ kafka_node_confluent_version.split('.')[0] }}.{{ kafka_node_confluent_version.split('.')[1] }}"
kafka_node_confluent_tgz: "confluent-community-{{ kafka_node_confluent_version }}.tar.gz"
kafka_node_confluent_url: "https://packages.confluent.io/archive/{{ kafka_node_confluent_minor }}/{{ kafka_node_confluent_tgz }}"
